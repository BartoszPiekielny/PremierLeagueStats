<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Stats</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">
        Premier League Stats
    </h1>

    <div class="mb-3">
        <button class="btn btn-primary" onclick="loadPlayers()">
            Load Players
        </button>

        <button class="btn btn-success" onclick="importPlayers()">
            Import Players
        </button>

        <button class="btn btn-warning" onclick="importCoaches()">
            Import Coaches
        </button>
    </div>

    <div class="row mb-3">

        <div class="col-md-5">
            <input
                id="nationalityInput"
                class="form-control"
                placeholder="Nationality">
        </div>

        <div class="col-md-2">
            <button
                class="btn btn-info w-100"
                onclick="searchNationality()">
                Search
            </button>
        </div>

    </div>

    <div class="row mb-4">

        <div class="col-md-5">
            <input
                id="clubInput"
                class="form-control"
                placeholder="Club name">
        </div>

        <div class="col-md-2">
            <button
                class="btn btn-secondary w-100"
                onclick="searchClub()">
                Show Squad
            </button>
        </div>

    </div>
    <div class="row mb-4">

    <div class="col-md-5">
        <input
            id="positionInput"
            class="form-control"
            placeholder="Position (ST, GK, CM...)">
    </div>

    <div class="col-md-2">
        <button
            class="btn btn-dark w-100"
            onclick="searchPosition()">
            Search Position
        </button>
    </div>

</div>
    <div class="row mb-4">

    <div class="col-md-5">
        <input
            id="nameInput"
            class="form-control"
            placeholder="Player name">
    </div>

    <div class="col-md-2">
        <button
            class="btn btn-primary w-100"
            onclick="searchPlayer()">
            Search Player
        </button>
    </div>

</div>
    <table class="table table-striped table-bordered">

        <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Nationality</th>
            <th>Position</th>
        </tr>
        </thead>

        <tbody id="playersTable"></tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>
